<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Surreal Digital Character Counter</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />

    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <!-- Floating Eyeballs -->
    <div class="eyeball eyeball-1">
        <div class="pupil"></div>
    </div>
    <div class="eyeball eyeball-2">
        <div class="pupil"></div>
    </div>
    <div class="eyeball eyeball-3">
        <div class="pupil"></div>
    </div>

    <!-- Background Blurs -->
    <div class="blur-circle blur-blue"></div>
    <div class="blur-circle blur-pink"></div>

    <!-- Main Content -->
    <main>

        <!-- Header -->
        <div class="header">
            <h1 class="title">
                Character <span class="title-highlight">Counter</span>
            </h1>
            <p class="subtitle">OWN YOUR WORDS. TRACK YOUR LIMITS. TRANSCEND THE TEXT.</p>
        </div>

        <!-- Counter Container -->
        <div class="counter-wrapper">

            <!-- Pink Outer Box -->
            <div class="counter-box">

                <!-- Side Buttons -->
                <div class="side-buttons">
                    <button class="side-btn btn-orange" id="clear-btn">
                        <span class="material-icons">delete</span>
                    </button>
                    <button class="side-btn btn-blue" id="copy-btn">
                        <span class="material-icons">content_copy</span>
                    </button>
                </div>

                <!-- Black Screen -->
                <div class="screen">
                    <textarea
                        class="text-input"
                        id="text-input"
                        placeholder="TYPE YOUR TRUTH HERE..."
                    ></textarea>

                    <!-- Stats Bar -->
                    <div class="stats-bar">
                        <div class="stat-box">
                            CHAR: <span id="char-count">0000</span>
                        </div>
                        <div class="stat-box">
                            WORDS: <span id="word-count">0000</span>
                        </div>
                        <div class="stat-box">
                            SENT: <span id="sentence-count">0000</span>
                        </div>
                    </div>
                </div>

                <!-- Corner Dots -->
                <div class="corner-dot dot-tl"></div>
                <div class="corner-dot dot-tr"></div>
                <div class="corner-dot dot-bl"></div>
                <div class="corner-dot dot-br"></div>

            </div>

            <!-- Decorative Fingers -->
            <div class="finger finger-right">
                <div class="finger-nail finger-nail-right"></div>
            </div>
            <div class="finger finger-left">
                <div class="finger-nail finger-nail-left"></div>
            </div>

        </div>

        <!-- Footer -->
        <div class="footer">
            <p>© 199X SURREAL TECH INDUSTRIES</p>
            <button class="toggle-btn" id="toggle-dark">Just existing bruh.</button>
        </div>

    </main>
    <script src="script.js"></script>
</body>
</html>
