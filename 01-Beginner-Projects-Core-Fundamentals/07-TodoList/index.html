<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Kyiv Task Manifest</title>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;700;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="dot-grid">
        <div class="container">
            <header class="header">
                <div class="header-left">
                    <div>
                        <h1 class="header-title">Kyiv Task Manifest</h1>
                        <p class="header-subtitle">Operator 01 // Sector: North</p>
                    </div>
                </div>
                <div class="header-status">
                    <p class="header-status-label">Status Report</p>
                    <p class="header-status-value">0 Tasks Remaining</p>
                </div>
            </header>

            <section class="add-mission-section">
                <div class="add-mission-card">
                    <h2 class="section-title">
                        <span class="accent-star">*</span> Add New Mission
                    </h2>
                    <div class="add-mission-grid">
                        <div class="field-mission-name">
                            <label class="field-label">Mission Name</label>
                            <input class="field-input field-input-lg" placeholder="Enter objective..." type="text" />
                        </div>
                        <div class="field-target-date">
                            <label class="field-label">Target Date</label>
                            <input class="field-input field-input-date" type="date" />
                        </div>
                        <div class="field-priority">
                            <label class="field-label">Priority</label>
                            <select class="field-select">
                                <option>High</option>
                                <option>Medium</option>
                                <option>Low</option>
                            </select>
                        </div>
                        <div class="field-deploy">
                            <button class="btn-deploy">Deploy Task</button>
                        </div>
                    </div>
                </div>
            </section>

            <div class="filter-bar">
                <div class="tab-group">
                    <button class="tab active-tab">All</button>
                    <button class="tab tab-bordered">Active</button>
                    <button class="tab tab-bordered">Completed</button>
                </div>
                <button class="btn-clear">Clear All Completed [X]</button>
            </div>

            <div class="task-list"></div>

            <section class="empty-state-card">
                <div class="empty-icon-wrapper">
                    <div class="empty-icon-box">
                        <span class="material-symbols-outlined empty-icon">description</span>
                        <div class="empty-icon-close">
                            <span class="material-symbols-outlined">close</span>
                        </div>
                    </div>
                    <div class="empty-icon-shadow"></div>
                </div>
                <h3 class="empty-state-title">Manifest Clear</h3>
                <p class="empty-state-desc">No active missions detected in this sector.</p>
                <button class="btn-initialize">
                    <span>INITIALIZE FIRST MISSION</span>
                    <span class="material-symbols-outlined btn-initialize-arrow">arrow_forward</span>
                </button>
            </section>

            <footer class="footer">
                <div class="footer-stars">* * *</div>
                <div class="footer-info">
                    <p class="footer-end">End of Manifest</p>
                    <p class="footer-version">System Version 4.0.1 // Kyiv, Ukraine</p>
                </div>
            </footer>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
