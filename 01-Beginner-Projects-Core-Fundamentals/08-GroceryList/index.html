<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Grit Grocery Manifest</title>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="texture-overlay"></div>

    <div class="page-wrapper">

        <header class="main-header">
            <div class="main-header-left">
                <h1 class="main-header-title">
                    Grit Grocery<br /><span class="main-header-title-highlight">Manifest</span>
                </h1>
                <p class="main-header-subtitle">Industrial Supply List</p>
            </div>
            <div class="main-header-right">
                <button class="btn-theme-toggle">
                    <span class="material-symbols-outlined">dark_mode</span>
                    <span>Shift to Dark</span>
                </button>
            </div>
        </header>

        <div class="main-grid">

            <aside class="sidebar">

                <section class="add-entry-card">
                    <h2 class="add-entry-title">Add Entry</h2>
                    <form class="add-entry-form">
                        <div class="form-group">
                            <label class="form-label">Item Designation</label>
                            <input class="form-input form-input-lg" id="itemName" placeholder="E.G. ORGANIC KALE" type="text" />
                        </div>
                        <div class="form-row-2col">
                            <div class="form-group">
                                <label class="form-label">Category</label>
                                <select class="form-select" id="itemCategory">
                                    <option>Vegetables</option>
                                    <option>Fruits</option>
                                    <option>Dairy</option>
                                    <option>Meat</option>
                                    <option>Industrial</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Quantity</label>
                                <input class="form-input" id="itemQuantity" type="number" value="1" />
                            </div>
                        </div>
                        <button class="btn-commit" id="btnCommit" type="button">Commit to List</button>
                    </form>
                </section>

                <section class="manifest-status-card">
                    <h2 class="manifest-status-title">Manifest Status</h2>
                    <div class="manifest-status-percentage" id="statusPercentage">0%</div>
                    <div class="progress-bar-wrapper">
                        <div class="progress-bar-fill" id="progressFill" style="width: 0%;"></div>
                        <div class="progress-bar-label" id="progressLabel">Load Bearing: 0 / 0 Secured</div>
                    </div>
                    <button class="btn-clear-purchased" id="btnClearPurchased">Clear All Purchased</button>
                </section>

            </aside>

            <main class="main-content">

                <div class="filters-section">
                    <div class="filter-tabs">
                        <button class="filter-tab filter-tab-active" data-filter="all">All</button>
                        <button class="filter-tab" data-filter="pending">Pending</button>
                        <button class="filter-tab" data-filter="purchased">Purchased</button>
                    </div>
                    <!-- <div class="sort-bar">
                        <span class="sort-label">Sort by:</span>
                        <div class="sort-buttons">
                            <button class="sort-btn" data-sort="category">Category</button>
                            <button class="sort-btn" data-sort="alphabetical">Alphabetical</button>
                            <button class="sort-btn" data-sort="date">Added Date</button>
                        </div>
                    </div> -->
                </div>

                <div class="grocery-groups" id="groceryGroups"></div>

                <div class="empty-state-container" id="emptyState">

                    <div class="empty-graphic-box">
                        <div class="empty-graphic-dotgrid"></div>
                        <div class="empty-graphic-content">
                            <span class="material-symbols-outlined empty-graphic-icon">package_2</span>
                            <div class="empty-graphic-badge">Empty Unit</div>
                        </div>
                        <div class="empty-graphic-corner-tl"></div>
                        <div class="empty-graphic-corner-br"></div>
                    </div>

                    <div class="empty-cta-buttons">
                        <button class="empty-btn-secondary" id="btnAddEntry">Add Entry</button>
                    </div>

                </div>

            </main>

        </div>

        <footer class="main-footer">
            <div class="main-footer-copy">&copy; 2026 GRIT CORP INDUSTRIAL SUPPLY</div>
            <div class="main-footer-log">LOG: #FF-992-00</div>
        </footer>

    </div>

    <script src="script.js"></script>
</body>
</html>
