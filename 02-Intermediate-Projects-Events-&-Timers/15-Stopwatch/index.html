<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Precision Architect — Timer</title>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;700;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="page-shell">

        <!-- ===== HEADER ===== -->
        <header class="main-header">
            <div class="header-left">
                <span class="material-symbols-outlined header-icon">timer</span>
                <h2 class="header-title">Precision.Architect</h2>
            </div>
        </header>

        <!-- ===== MAIN ===== -->
        <main class="main-content">

            <!-- Timer Display -->
            <div class="timer-display">
                <span class="timer-session-label">Current Session</span>
                <h1 class="timer-value">
                    00:00:00:00</span>
                </h1>
            </div>

            <!-- Controls -->
            <div class="controls-card">
                <div class="controls-row">
                    <button class="btn-control btn-primary">Start</button>
                    <button class="btn-control btn-outline" id="stopBtn">Stop</button>
                    <button class="btn-control btn-outline" id="resetBtn">Reset</button>
                </div>
            </div>

        </main>

        <!-- ===== FOOTER ===== -->
        <footer class="main-footer">
            <div class="footer-status">Status: System Ready // Frequency: 1.000ms</div>
            <div class="footer-version">Precision Timing</div>
        </footer>

    </div>
    <script src="script.js"></script>
</body>
</html>
