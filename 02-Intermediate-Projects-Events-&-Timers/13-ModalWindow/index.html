<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>About Me</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- ── Theme Toggle ────────────────────────────── -->
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
    <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="square">
      <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/>
    </svg>
    <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="square">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1" x2="12" y2="3"/>
      <line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/>
      <line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
  </button>

  <!-- ── Page ────────────────────────────────────── -->
  <div class="page">
    <button class="about-btn" id="aboutBtn">About me</button>
  </div>

  <!-- ══ MODAL ════════════════════════════════════ -->
  <div class="overlay" id="overlay">
    <div class="card" id="card" role="dialog" aria-modal="true" aria-label="About me">

      <!-- Close -->
      <button class="card-close" id="cardClose" aria-label="Close">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <line x1="1" y1="1" x2="13" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"/>
          <line x1="13" y1="1" x2="1" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"/>
        </svg>
      </button>

      <!-- Avatar -->
      <div class="card-avatar-wrap">
        <img
          class="card-avatar"
          src="./@pfp_awk.jpeg"
          alt="User avatar"
          width="88" height="88"
        />
        <div class="card-status" title="Available for work"></div>
      </div>

      <!-- Identity -->
      <h2 class="card-name">Shailendra K.</h2>
      <p class="card-handle">@kousei · he/him</p>

      <!-- Bio -->
      <p class="card-bio">
        Creative developer building thoughtful digital experiences.
        Passionate about design systems, motion, and clean code.
      </p>

      <!-- Tags -->
      <div class="card-tags">
        <span class="tag">UI / UX</span>
        <span class="tag">Frontend</span>
        <span class="tag">Open Source</span>
      </div>

      <!-- Divider -->
      <div class="card-rule"></div>

      <!-- Social icons -->
      <div class="card-socials">
        <a class="social-link" href="https://github.com" target="_blank" rel="noopener" aria-label="GitHub">
          <i class="fa-brands fa-github"></i>
        </a>
        <a class="social-link" href="https://instagram.com" target="_blank" rel="noopener" aria-label="Instagram">
          <i class="fa-brands fa-instagram"></i>
        </a>
        <a class="social-link" href="https://linkedin.com" target="_blank" rel="noopener" aria-label="LinkedIn">
          <i class="fa-brands fa-linkedin"></i>
        </a>
      </div>

      <!-- CTA buttons -->
      <div class="card-ctas">
        <a class="cta-btn cta-primary" href="#" target="_blank" rel="noopener">
          Portfolio ↗
        </a>
        <a class="cta-btn cta-ghost" href="#" target="_blank" rel="noopener">
          Resume ↓
        </a>
      </div>

      <!-- Footer info -->
      <p class="card-location">📍 India &nbsp;·&nbsp; Available for freelance</p>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
